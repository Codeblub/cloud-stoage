<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>1PB Vault Control</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: monospace; padding: 20px; line-height: 1.4; }
        .file-item { border-bottom: 1px solid #222; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .file-item:hover { background: #111; }
        .btn { cursor: pointer; padding: 6px 12px; border: 1px solid #00ff41; background: none; color: #00ff41; margin-left: 5px; text-decoration: none; font-family: monospace; }
        .btn:hover { background: #00ff41; color: #000; }
        .btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #editor-text { width: 90%; height: 70%; background: #111; color: #00ff41; border: 1px solid #444; padding: 10px; font-family: monospace; font-size: 14px; }
        .upload-section { margin-bottom: 20px; padding: 15px; border: 1px dashed #444; }
        .status-tag { background: #004400; color: #fff; padding: 2px 6px; font-size: 10px; margin-left: 10px; border-radius: 3px; }
        #breadcrumb { color: #00ff41; cursor: pointer; margin-bottom: 15px; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>☁️ 1PB Vault Engine</h1>

    <div class="upload-section">
        <input type="file" id="fileInput">
        <button class="btn" onclick="uploadFile()">Push to Cloud</button>
        <span id="upStatus" style="margin-left:10px;"></span>
    </div>

    <div id="breadcrumb" onclick="loadVault('vault')">🏠 Root</div>
    <div id="fileList">Scanning Vault...</div>

    <div id="overlay">
        <button class="btn" style="margin-bottom: 15px;" onclick="closeOverlay()">[ X ] CLOSE</button>
        <div id="contentArea" style="width:100%; text-align:center;"></div>
    </div>

    <script>
        const repo = "Codeblub/cloud-stoage";
        const token = "YOUR_GITHUB_TOKEN_HERE"; // Ensure your token is here
        let currentPath = "vault";

        async function loadVault(path = "vault") {
            currentPath = path;
            const breadcrumbText = path === "vault" ? "🏠 Root" : `🏠 Root / ${path.replace('vault/', '')}`;
            document.getElementById('breadcrumb').innerText = breadcrumbText;
            
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                    headers: { "Authorization": `token ${token}` }
                });
                const rawFiles = await res.json();
                
                // Group Parts into Single Files
                const processed = new Map();
                rawFiles.forEach(f => {
                    if(f.name === "placeholder.txt" || f.name === "index.html") return;
                    
                    let baseName = f.name;
                    let isPart = false;
                    if (f.name.includes('.part')) {
                        baseName = f.name.split('.part')[0];
                        isPart = true;
                    }

                    if (!processed.has(baseName)) {
                        processed.set(baseName, { ...f, name: baseName, isLarge: false, parts: [] });
                    }
                    
                    const entry = processed.get(baseName);
                    if (isPart) {
                        entry.isLarge = true;
                        entry.parts.push({path: f.path, sha: f.sha});
                    } else {
                        entry.sha = f.sha; // Keep SHA for single files
                    }
                });

                renderFiles(processed);
            } catch (err) {
                document.getElementById('fileList').innerHTML = "Error loading files. Check console/token.";
            }
        }

        function renderFiles(fileMap) {
            let html = "";
            fileMap.forEach(f => {
                const isDir = f.type === 'dir';
                const label = isDir ? '📁' : '📄';
                const largeTag = f.isLarge ? `<span class="status-tag">LARGE (${f.parts.length} PARTS)</span>` : "";
                
                // Data attributes used for deletion logic
                const partsData = JSON.stringify(f.parts);
                
                html += `
                <div class="file-item">
                    <span style="cursor:pointer;" onclick="${isDir ? `loadVault('${f.path}')` : `openFile('${f.download_url}', '${f.name}', '${f.path}')`}">
                        ${label} <strong>${f.name}</strong> ${largeTag}
                    </span>
                    <div>
                        ${f.isLarge ? `<button class="btn" disabled title="Sync to E: Drive to open">CLOUD ONLY</button>` : `<button class="btn" onclick="window.open('${f.download_url}')">DL</button>`}
                        <button class="btn" style="border-color:red; color:red;" id="del-${f.name.replace(/\W/g,'')}" 
                            onclick="handleDelete('${f.name}', '${f.path}', '${f.sha}', ${f.isLarge}, ${partsData.replace(/"/g, '&quot;')})">DEL</button>
                    </div>
                </div>`;
            });
            document.getElementById('fileList').innerHTML = html || "Folder is empty.";
        }

        async function handleDelete(name, path, sha, isLarge, parts) {
            const btn = document.getElementById(`del-${name.replace(/\W/g,'')}`);
            if(!confirm(`Permanently delete ${name}?`)) return;

            btn.disabled = true;
            btn.innerText = "⏳...";

            if (isLarge) {
                for(let i = 0; i < parts.length; i++) {
                    btn.innerText = `${i+1}/${parts.length}`;
                    await deleteRequest(parts[i].path, parts[i].sha);
                }
            } else {
                await deleteRequest(path, sha);
            }

            loadVault(currentPath);
        }

        async function deleteRequest(path, sha) {
            return fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                method: "DELETE",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Delete via Web", sha: sha })
            });
        }

        function openFile(url, name, path) {
            const area = document.getElementById('contentArea');
            const overlay = document.getElementById('overlay');
            const ext = name.split('.').pop().toLowerCase();
            overlay.style.display = 'flex';

            if (['mp3', 'wav', 'ogg'].includes(ext)) {
                area.innerHTML = `<audio controls autoplay src="${url}"></audio><h2>${name}</h2>`;
            } else if (['mp4', 'webm'].includes(ext)) {
                area.innerHTML = `<video controls autoplay src="${url}" style="max-height:60vh;"></video><h2>${name}</h2>`;
            } else if (['txt', 'env', 'json', 'js', 'html', 'md'].includes(ext)) {
                fetch(url).then(r => r.text()).then(text => {
                    area.innerHTML = `<h2>Editing: ${name}</h2><textarea id="editor-text">${text}</textarea><br><button class="btn" onclick="saveText('${path}')">Save to Cloud</button>`;
                });
            } else {
                area.innerHTML = `<h2>No Preview</h2><p>${name} must be downloaded to view.</p>`;
            }
        }

        async function saveText(path) {
            const content = btoa(unescape(encodeURIComponent(document.getElementById('editor-text').value)));
            const getFile = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                headers: { "Authorization": `token ${token}` }
            });
            const fileData = await getFile.json();
            await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                method: "PUT",
                headers: { "Authorization": `token ${token}` },
                body: JSON.stringify({ message: "Edit", content: content, sha: fileData.sha })
            });
            alert("Saved!"); closeOverlay(); loadVault(currentPath);
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('upStatus');
            const file = fileInput.files[0];
            if(!file) return;

            status.innerText = "Processing...";
            const reader = new FileReader();
            reader.onload = async () => {
                const content = reader.result.split(',')[1];
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/${currentPath}/${file.name}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}` },
                    body: JSON.stringify({ message: `Upload ${file.name}`, content: content })
                });
                if(res.ok) {
                    status.innerText = "✅ Done!";
                    fileInput.value = "";
                    loadVault(currentPath);
                } else { status.innerText = "❌ Error"; }
            };
            reader.readAsDataURL(file);
        }

        function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }
        
        loadVault();
    </script>
</body>
</html>
