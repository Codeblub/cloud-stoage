<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>1PB Hackintosh Vault</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 40px; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        #login-screen, #app-screen { display: none; }
        input[type="password"], input[type="file"] { padding: 10px; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 5px; }
        #path-bar { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-family: monospace; color: #00ff00; border: 1px solid #333; }
        .upload-zone { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 2px dashed #444; text-align: center; }
        #explorer { display: flex; flex-direction: column; gap: 10px; }
        .item { background: #1e1e1e; padding: 15px 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .folder { color: #ffca28; font-weight: bold; cursor: pointer; flex-grow: 1; }
        .file { color: #81d4fa; }
        button { cursor: pointer; background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 6px; }
        button.upload-btn { background: #28a745; margin-top: 10px; }
        .logout { background: #ff5252; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-screen">
            <h1>🔐 Vault Access</h1>
            <input type="password" id="token-input" placeholder="Enter GitHub Token">
            <button onclick="saveToken()">Login</button>
        </div>

        <div id="app-screen">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h1>☁️ 1PB Hackintosh Vault</h1>
                <button class="logout" onclick="logout()">Logout</button>
            </div>

            <div id="path-bar">root / vault</div>

            <div class="upload-zone">
                <p id="upload-label">Upload file to current directory</p>
                <input type="file" id="file-picker">
                <button class="upload-btn" onclick="uploadFile()">🚀 Upload to Current Folder</button>
            </div>

            <div id="explorer">Connecting...</div>
        </div>
    </div>

    <script>
        const REPO = "Codeblub/cloud-stoage";
        let TOKEN = localStorage.getItem('gh_token');
        let currentPath = "vault";

        function checkAuth() {
            if (!TOKEN) {
                document.getElementById('login-screen').style.display = 'block';
                document.getElementById('app-screen').style.display = 'none';
            } else {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                loadVault();
            }
        }

        function saveToken() {
            const val = document.getElementById('token-input').value;
            if(val) { localStorage.setItem('gh_token', val); TOKEN = val; checkAuth(); }
        }

        function logout() { localStorage.removeItem('gh_token'); location.reload(); }

        async function loadVault(path = "vault") {
            currentPath = path;
            const explorer = document.getElementById('explorer');
            document.getElementById('path-bar').innerText = path.replace(/\//g, " ❯ ");
            document.getElementById('upload-label').innerText = `Target Folder: ${path}`;
            explorer.innerHTML = "Scanning...";

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                    headers: { 'Authorization': `token ${TOKEN}` }
                });
                if (res.status === 401) logout();
                const items = await res.json();
                explorer.innerHTML = "";

                if (path !== "vault") {
                    const back = document.createElement('div');
                    back.innerHTML = "<span style='cursor:pointer;color:#aaa;'>⬅ Go Back</span>";
                    back.onclick = () => {
                        const p = path.split('/'); p.pop();
                        loadVault(p.join('/') || "vault");
                    };
                    explorer.appendChild(back);
                }

                items.forEach(item => {
                    if (item.name.includes(".part")) return;
                    const div = document.createElement('div');
                    div.className = "item";
                    if (item.type === "dir") {
                        div.innerHTML = `<div class="folder" onclick="loadVault('${item.path}')">📁 ${item.name}/</div>`;
                    } else {
                        const size = (item.size / (1024 * 1024)).toFixed(2);
                        div.innerHTML = `<div class="file">📄 ${item.name}</div><div><span style='font-size:12px;color:#888;margin-right:10px;'>${size}MB</span><button onclick="window.open('${item.download_url}')">Download</button></div>`;
                    }
                    explorer.appendChild(div);
                });
            } catch (e) { explorer.innerHTML = "Error loading folder."; }
        }

        async function uploadFile() {
            const file = document.getElementById('file-picker').files[0];
            if (!file) return alert("Select a file first!");
            
            const reader = new FileReader();
            reader.onload = async () => {
                const content = reader.result.split(',')[1];
                const dest = `${currentPath}/${file.name}`;
                
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${dest}`, {
                    method: "PUT",
                    headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Web upload: ${file.name}`, content: content })
                });

                if (res.ok) { alert("Upload Successful!"); loadVault(currentPath); }
                else { alert("Upload failed. File might be too big for web upload (25MB limit)."); }
            };
            reader.readAsDataURL(file);
        }

        checkAuth();
    </script>
</body>
</html>
