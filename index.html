<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1PB Vault Control</title>
    <style>
        :root { --neon: #00ff41; --dim: #003b00; }
        body { 
            background: #050505; color: var(--neon); font-family: 'Courier New', monospace; 
            margin: 0; padding: 20px; text-transform: uppercase; letter-spacing: 1px;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }
        h2, h3 { border-bottom: 1px dashed var(--neon); padding-bottom: 5px; }
        .box { border: 1px solid var(--neon); padding: 15px; margin-bottom: 20px; box-shadow: 0 0 10px var(--dim); }
        
        /* Input & Buttons */
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; font-family: inherit; width: 250px; }
        button { background: var(--neon); color: #000; border: none; padding: 8px 15px; cursor: pointer; font-family: inherit; font-weight: bold; margin: 5px 0; }
        button:hover { background: #fff; box-shadow: 0 0 15px var(--neon); }
        .btn-delete { background: #550000; color: #ff0000; border: 1px solid #ff0000; margin-left: 10px; }
        .btn-delete:hover { background: #ff0000; color: #000; }

        /* Progress Bar */
        .prog-container { width: 100%; border: 1px solid var(--neon); height: 25px; margin: 15px 0; display: none; position: relative; }
        .prog-bar { height: 100%; background: var(--neon); width: 0%; transition: width 0.2s; }
        .prog-text { position: absolute; width: 100%; text-align: center; color: #000; font-weight: bold; line-height: 25px; }

        /* File List */
        .file-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid var(--dim); }
        .file-row:hover { background: var(--dim); }
    </style>
</head>
<body>

    <div class="box">
        <h2>🔒 1PB VAULT SYSTEM</h2>
        <div id="setup">
            <input type="text" id="tk" placeholder="ENTER ACCESS KEY...">
            <button onclick="init()">INITIALIZE</button>
        </div>
    </div>

    <div class="box">
        <h3>FILE UPLINK</h3>
        <input type="file" id="up-input">
        <button onclick="transfer()">START UPLOAD</button>
        
        <div class="prog-container" id="pctr">
            <div class="prog-text" id="ptxt">0%</div>
            <div class="prog-bar" id="pbr"></div>
        </div>
    </div>

    <div class="box">
        <h3>LOCAL VAULT INDEX</h3>
        <button onclick="refresh()">SYNC INDEX</button>
        <div id="index">READY FOR COMMAND...</div>
    </div>

    <script>
        const REPO = "Codeblub/cloud-stoage";
        const PATH = "vault";

        function init() {
            localStorage.setItem('vb_tk', document.getElementById('tk').value);
            refresh();
        }

        async function transfer() {
            const tk = localStorage.getItem('vb_tk');
            const file = document.getElementById('up-input').files[0];
            if(!file || !tk) return alert("MISSING DATA");

            const pbr = document.getElementById('pbr');
            const ptxt = document.getElementById('ptxt');
            document.getElementById('pctr').style.display = 'block';

            const reader = new FileReader();
            reader.onload = async () => {
                const content = reader.result.split(',')[1];
                ptxt.innerText = "UPLOADING...";
                pbr.style.width = "50%"; // Mid-point visual

                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}/${file.name}`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `token ${tk}`,
                        'X-GitHub-Api-Version': '2022-11-28'
                    },
                    body: JSON.stringify({ message: "uplink", content: content })
                });

                if(res.ok) {
                    pbr.style.width = "100%";
                    ptxt.innerText = "SUCCESS";
                    setTimeout(() => { document.getElementById('pctr').style.display='none'; refresh(); }, 2000);
                } else {
                    ptxt.innerText = "FAILED";
                    pbr.style.background = "red";
                }
            };
            reader.readAsDataURL(file);
        }

        async function refresh() {
            const tk = localStorage.getItem('vb_tk');
            const container = document.getElementById('index');
            container.innerText = "FETCHING...";

            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${PATH}`, {
                headers: { 'Authorization': `token ${tk}`, 'X-GitHub-Api-Version': '2022-11-28' }
            });
            const data = await res.json();
            
            container.innerHTML = "";
            data.forEach(f => {
                if(f.type === "dir") return;
                const row = document.createElement('div');
                row.className = "file-row";
                row.innerHTML = `
                    <span>> ${f.name}</span>
                    <div>
                        <button onclick="window.open('${f.download_url}')">GET</button>
                        <button class="btn-delete" onclick="drop('${f.path}','${f.sha}')">DEL</button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        async function drop(p, s) {
            const tk = localStorage.getItem('vb_tk');
            if(!confirm("DELETE PERMANENTLY?")) return;
            await fetch(`https://api.github.com/repos/${REPO}/contents/${p}`, {
                method: 'DELETE',
                headers: { 'Authorization': `token ${tk}`, 'X-GitHub-Api-Version': '2022-11-28' },
                body: JSON.stringify({ message: "delete", sha: s })
            });
            refresh();
        }

        if(localStorage.getItem('vb_tk')) refresh();
    </script>
</body>
</html>
