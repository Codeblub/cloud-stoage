<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1PB Vault Control</title>
    <style>
        :root { --neon: #00ff41; --dim: #003b00; }
        body { background: #000; color: var(--neon); font-family: 'Courier New', monospace; margin: 0; text-transform: uppercase; overflow-x: hidden; }
        body::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 9999; pointer-events: none; background-size: 100% 2px, 3px 100%; }
        #lockscreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .lock-box { border: 2px solid var(--neon); padding: 40px; text-align: center; box-shadow: 0 0 20px var(--dim); }
        #main-ui { display: none; padding: 20px; }
        .box { border: 1px solid var(--neon); padding: 15px; margin-bottom: 20px; background: rgba(0,20,0,0.2); }
        .file-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid var(--dim); align-items: center; }
        .folder-icon { color: #f0db4f; font-weight: bold; margin-right: 8px; }
        button { background: var(--neon); color: #000; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; margin: 2px; }
        button:hover { background: #fff; }
        .btn-danger { background: #ff0033; color: #fff; }
        input { background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 5px; margin: 5px; }
    </style>
</head>
<body>
    <div id="lockscreen">
        <div class="lock-box">
            <h1>[VAULT LOCKED]</h1>
            <input type="password" id="pass-key" placeholder="ACCESS TOKEN...">
            <button onclick="unlock()">DECRYPT</button>
        </div>
    </div>

    <div id="main-ui">
        <div class="box">
            <h2>1PB VAULT OS</h2>
            <button onclick="logout()">TERMINATE SESSION</button>
        </div>

        <div class="box">
            <h3>COMMAND CENTER</h3>
            <button onclick="createNewFolder()">+ NEW FOLDER</button>
            <input type="file" id="file-upload" style="display:none" onchange="uploadFile(this.files[0])">
            <button onclick="document.getElementById('file-upload').click()">↑ UPLOAD FILE</button>
        </div>

        <div class="box">
            <h3>MANIFEST <span id="current-path">/VAULT</span></h3>
            <button onclick="goBack()">.. BACK</button>
            <button onclick="fetchFiles()">REFRESH</button>
            <div id="file-list"></div>
        </div>
    </div>

    <script>
        const REPO = "Codeblub/cloud-stoage";
        let currentDir = "vault";
        let allFilesRaw = []; // Store raw data for bulk actions

        function unlock() {
            const k = document.getElementById('pass-key').value;
            localStorage.setItem('v_auth', k);
            showUI();
        }

        function showUI() {
            document.getElementById('lockscreen').style.display="none";
            document.getElementById('main-ui').style.display="block";
            fetchFiles();
        }

        function logout() { localStorage.removeItem('v_auth'); location.reload(); }

        async function fetchFiles() {
            const tk = localStorage.getItem('v_auth');
            const list = document.getElementById('file-list');
            list.innerHTML = "SYNCING GHOST CORES...";
            
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${currentDir}`, {
                    headers: {'Authorization': `token ${tk}`}
                });
                allFilesRaw = await res.json();
                list.innerHTML = "";
                
                const processedVirtuals = new Set();

                allFilesRaw.forEach(f => {
                    if (f.name === ".keep") return;

                    // --- GHOST PART GROUPING ---
                    if (f.name.includes(".ghostpart")) {
                        const baseName = f.name.split('.ghostpart')[0];
                        if (processedVirtuals.has(baseName)) return; 
                        processedVirtuals.add(baseName);

                        renderRow(baseName, true, null, list);
                        return;
                    }

                    renderRow(f.name, f.type === "dir", f, list);
                });
            } catch(e) { list.innerHTML = "ACCESS DENIED"; }
        }

        function renderRow(name, isVirtualOrDir, fileObj, container) {
            const div = document.createElement('div');
            div.className = 'file-row';
            const isDir = fileObj && fileObj.type === "dir";
            const isVirtual = !fileObj && isVirtualOrDir;

            div.innerHTML = `
                <span>${isDir ? '<span class="folder-icon">[DIR]</span>' : isVirtual ? '<span style="color:cyan">[VIRTUAL]</span>' : '> '} ${name}</span>
                <div>
                    ${isDir ? `<button onclick="enterDir('${fileObj.path}')">OPEN</button>` : isVirtual ? `<button onclick="alert('Use VaultFS.exe to Sync')">SYNC</button>` : `<button onclick="window.open('${fileObj.download_url}')">GET</button>`}
                    <button onclick="renameItem('${name}', '${fileObj ? fileObj.sha : ''}', ${isVirtual})">RENAME</button>
                    <button class="btn-danger" onclick="deleteItem('${name}', '${fileObj ? fileObj.sha : ''}', ${isVirtual})">X</button>
                </div>`;
            container.appendChild(div);
        }

        // --- TOOLKIT LOGIC ---

        async function deleteItem(name, sha, isVirtual) {
            if(!confirm(`PERMANENTLY DELETE ${name}?`)) return;
            const tk = localStorage.getItem('v_auth');

            if(isVirtual) {
                // Delete all parts
                const parts = allFilesRaw.filter(f => f.name.startsWith(name + ".ghostpart"));
                for(let p of parts) {
                    await fetch(`https://api.github.com/repos/${REPO}/contents/${p.path}`, {
                        method: 'DELETE',
                        headers: {'Authorization': `token ${tk}`},
                        body: JSON.stringify({ message: `Purge Part: ${p.name}`, sha: p.sha })
                    });
                }
            } else {
                await fetch(`https://api.github.com/repos/${REPO}/contents/${currentDir}/${name}`, {
                    method: 'DELETE',
                    headers: {'Authorization': `token ${tk}`},
                    body: JSON.stringify({ message: `Delete: ${name}`, sha: sha })
                });
            }
            fetchFiles();
        }

        async function createNewFolder() {
            const n = prompt("FOLDER NAME:");
            if(!n) return;
            const tk = localStorage.getItem('v_auth');
            await fetch(`https://api.github.com/repos/${REPO}/contents/${currentDir}/${n}/.keep`, {
                method: 'PUT',
                headers: {'Authorization': `token ${tk}`},
                body: JSON.stringify({ message: `Create Dir: ${n}`, content: btoa(" ") })
            });
            fetchFiles();
        }

        async function renameItem(oldName, sha, isVirtual) {
            const n = prompt("NEW NAME:", oldName);
            if(!n || n === oldName) return;
            alert("Rename triggers a move operation. Large virtual files should be renamed via VaultFS.exe for safety.");
            // Standard rename logic would go here, but for 1PB, Engine handles it better.
        }

        function enterDir(p) { currentDir = p; fetchFiles(); }
        function goBack() { 
            if(currentDir === "vault") return;
            currentDir = currentDir.split('/').slice(0,-1).join('/');
            fetchFiles();
        }

        if (localStorage.getItem('v_auth')) showUI();
    </script>
</body>
</html>
