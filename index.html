<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>1PB Vault Control</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: monospace; padding: 20px; line-height: 1.4; }
        .file-item { border-bottom: 1px solid #222; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .file-item:hover { background: #111; }
        .btn { cursor: pointer; padding: 6px 12px; border: 1px solid #00ff41; background: none; color: #00ff41; margin-left: 5px; text-decoration: none; font-family: monospace; }
        .btn:hover { background: #00ff41; color: #000; }
        .btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        
        /* Login Screen */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #token-input { background: #111; border: 1px solid #00ff41; color: #00ff41; padding: 10px; width: 350px; margin-bottom: 15px; text-align: center; font-family: monospace; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #editor-text { width: 90%; height: 70%; background: #111; color: #00ff41; border: 1px solid #444; padding: 10px; font-family: monospace; font-size: 14px; }
        .upload-section { margin-bottom: 20px; padding: 15px; border: 1px dashed #444; }
        .status-tag { background: #004400; color: #fff; padding: 2px 6px; font-size: 10px; margin-left: 10px; border-radius: 3px; }
        #breadcrumb { color: #00ff41; cursor: pointer; margin-bottom: 15px; font-size: 1.2em; border-bottom: 1px solid #00ff41; display: inline-block; padding-bottom: 2px; }
        .hidden { display: none !important; }
        audio, video { width: 80%; max-width: 800px; border: 1px solid #00ff41; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>🔒 VAULT LOCKDOWN</h1>
        <p>Enter your <b>Fine-grained</b> or <b>Classic</b> token below:</p>
        <input type="password" id="token-input" placeholder="github_pat_... or ghp_...">
        <br>
        <button class="btn" onclick="unlockVault()">START ENGINE</button>
        <p style="font-size: 11px; color: #666; margin-top: 30px; max-width: 400px;">
            Token is saved to your browser's <b>localStorage</b>.
        </p>
    </div>

    <div id="main-content" class="hidden">
        <h1>☁️ 1PB Vault Engine</h1>
        
        <div class="upload-section">
            <input type="file" id="fileInput">
            <button class="btn" onclick="uploadFile()">Push to Cloud</button>
            <button class="btn" style="float: right; border-color: #ff4141; color: #ff4141;" onclick="lockVault()">Lock Vault</button>
            <span id="upStatus" style="margin-left:10px;"></span>
        </div>

        <div id="breadcrumb" onclick="loadVault('vault')">🏠 Root</div>
        <div id="fileList">Initializing...</div>
    </div>

    <div id="overlay">
        <button class="btn" style="margin-bottom: 15px;" onclick="closeOverlay()">[ X ] CLOSE PREVIEW</button>
        <div id="contentArea" style="width:100%; text-align:center;"></div>
    </div>

    <script>
        const repo = "Codeblub/cloud-stoage";
        let token = localStorage.getItem('vault_token');
        let currentPath = "vault";

        if (token) { showMain(); }

        function unlockVault() {
            const val = document.getElementById('token-input').value.trim();
            // ALLOWS BOTH TOKEN TYPES
            if (val.startsWith('ghp_') || val.startsWith('github_pat_')) {
                localStorage.setItem('vault_token', val);
                token = val;
                showMain();
            } else {
                alert("Invalid format! Fine-grained tokens must start with 'github_pat_'.");
            }
        }

        function showMain() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            loadVault();
        }

        function lockVault() {
            localStorage.removeItem('vault_token');
            location.reload();
        }

        async function loadVault(path = "vault") {
            currentPath = path;
            const breadcrumbText = path === "vault" ? "🏠 Root" : `🏠 Root / ${path.replace('vault/', '')}`;
            document.getElementById('breadcrumb').innerText = breadcrumbText;
            document.getElementById('fileList').innerText = "Scanning...";

            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                    headers: { "Authorization": `token ${token}` }
                });
                
                if (!res.ok) throw new Error("Unauthorized");
                const rawFiles = await res.json();
                
                const processed = new Map();
                rawFiles.forEach(f => {
                    if(f.name === "placeholder.txt" || f.name === "index.html") return;
                    let baseName = f.name;
                    let isPart = false;
                    if (f.name.includes('.part')) {
                        baseName = f.name.split('.part')[0];
                        isPart = true;
                    }
                    if (!processed.has(baseName)) {
                        processed.set(baseName, { ...f, name: baseName, isLarge: false, parts: [] });
                    }
                    const entry = processed.get(baseName);
                    if (isPart) {
                        entry.isLarge = true;
                        entry.parts.push({path: f.path, sha: f.sha});
                    } else { entry.sha = f.sha; }
                });
                renderFiles(processed);
            } catch (err) {
                alert("Login Failed: Token invalid or lacks 'repo' permissions.");
                lockVault();
            }
        }

        function renderFiles(fileMap) {
            let html = "";
            fileMap.forEach(f => {
                const isDir = f.type === 'dir';
                const label = isDir ? '📁' : '📄';
                const largeTag = f.isLarge ? `<span class="status-tag">SPLIT (${f.parts.length} PARTS)</span>` : "";
                const partsJSON = JSON.stringify(f.parts).replace(/"/g, '&quot;');
                
                html += `
                <div class="file-item">
                    <span style="cursor:pointer;" onclick="${isDir ? `loadVault('${f.path}')` : `openFile('${f.download_url}', '${f.name}', '${f.path}')`}">
                        ${label} <strong>${f.name}</strong> ${largeTag}
                    </span>
                    <div>
                        ${f.isLarge ? `<button class="btn" disabled title="Sync to E: Drive to open">CLOUD ONLY</button>` : `<button class="btn" onclick="window.open('${f.download_url}')">DL</button>`}
                        <button class="btn" style="border-color:red; color:red;" id="del-${f.name.replace(/\W/g,'')}" 
                            onclick="handleDelete('${f.name}', '${f.path}', '${f.sha}', ${f.isLarge}, ${partsJSON})">DEL</button>
                    </div>
                </div>`;
            });
            document.getElementById('fileList').innerHTML = html || "Folder is empty.";
        }

        async function handleDelete(name, path, sha, isLarge, parts) {
            const btn = document.getElementById(`del-${name.replace(/\W/g,'')}`);
            if(!confirm(`Permanently delete ${name}?`)) return;
            btn.disabled = true;
            btn.innerText = "⏳...";
            try {
                if (isLarge) {
                    for(let i = 0; i < parts.length; i++) {
                        btn.innerText = `${i+1}/${parts.length}`;
                        await fetch(`https://api.github.com/repos/${repo}/contents/${parts[i].path}`, {
                            method: "DELETE",
                            headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                            body: JSON.stringify({ message: "Delete Part", sha: parts[i].sha })
                        });
                    }
                } else {
                    await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                        method: "DELETE",
                        headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ message: "Delete File", sha: sha })
                    });
                }
                loadVault(currentPath);
            } catch (e) {
                alert("Delete failed.");
                btn.disabled = false;
                btn.innerText = "DEL";
            }
        }

        function openFile(url, name, path) {
            const area = document.getElementById('contentArea');
            const overlay = document.getElementById('overlay');
            const ext = name.split('.').pop().toLowerCase();
            overlay.style.display = 'flex';
            if (['mp3', 'wav', 'ogg'].includes(ext)) {
                area.innerHTML = `<audio controls autoplay src="${url}"></audio><h2>${name}</h2>`;
            } else if (['mp4', 'webm'].includes(ext)) {
                area.innerHTML = `<video controls autoplay src="${url}" style="max-height:60vh;"></video><h2>${name}</h2>`;
            } else if (['txt', 'env', 'json', 'js', 'html', 'md'].includes(ext)) {
                fetch(url).then(r => r.text()).then(text => {
                    area.innerHTML = `<h2>Editing: ${name}</h2><textarea id="editor-text">${text}</textarea><br><button class="btn" onclick="saveText('${path}')">Save Changes</button>`;
                });
            } else { area.innerHTML = `<h2>No Preview</h2><p>${name} must be downloaded or synced to E: Drive.</p>`; }
        }

        async function saveText(path) {
            const content = btoa(unescape(encodeURIComponent(document.getElementById('editor-text').value)));
            const getFile = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, { headers: { "Authorization": `token ${token}` } });
            const fileData = await getFile.json();
            await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                method: "PUT",
                headers: { "Authorization": `token ${token}` },
                body: JSON.stringify({ message: "Edit", content: content, sha: fileData.sha })
            });
            alert("Changes Saved!"); closeOverlay(); loadVault(currentPath);
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('upStatus');
            const file = fileInput.files[0];
            if(!file) return;
            status.innerText = "Encoding...";
            const reader = new FileReader();
            reader.onload = async () => {
                const content = reader.result.split(',')[1];
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/${currentPath}/${file.name}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}` },
                    body: JSON.stringify({ message: `Upload ${file.name}`, content: content })
                });
                if(res.ok) { status.innerText = "✅ Uploaded!"; fileInput.value = ""; loadVault(currentPath); } else { status.innerText = "❌ Error"; }
            };
            reader.readAsDataURL(file);
        }

        function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>
</html>
