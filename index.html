<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1PB Cloud Explorer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 30px; }
        h1 { color: #fff; border-bottom: 2px solid #333; padding-bottom: 10px; }
        #path-display { margin-bottom: 15px; color: #00ff00; font-family: monospace; background: #1a1a1a; padding: 10px; border-radius: 5px; }
        #explorer { display: flex; flex-direction: column; gap: 10px; }
        .item { background: #1e1e1e; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .item:hover { background: #252525; }
        .folder { color: #ffca28; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .file { color: #81d4fa; }
        button { cursor: pointer; background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; }
        button:hover { background: #0056b3; }
        .back-link { color: #aaa; cursor: pointer; text-decoration: underline; margin-bottom: 15px; display: inline-block; }
    </style>
</head>
<body>

    <h1>☁️ 1PB Hackintosh Vault</h1>
    <div id="path-display">Location: vault</div>
    <div id="explorer">Initializing connection to GitHub...</div>

    <script>
        const REPO = "Codeblub/cloud-stoage";
        const TOKEN = "YOUR_GITHUB_TOKEN_HERE"; 

        async function loadVault(path = "vault") {
            const explorer = document.getElementById('explorer');
            const pathDisplay = document.getElementById('path-display');
            pathDisplay.innerText = `Location: ${path}`;
            explorer.innerHTML = "Opening folder...";

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                    headers: { 'Authorization': `token ${TOKEN}` }
                });
                const data = await response.json();
                explorer.innerHTML = "";

                // Add a Back button if inside a subfolder
                if (path !== "vault") {
                    const back = document.createElement('div');
                    back.className = "back-link";
                    back.innerHTML = "← Back to Root";
                    back.onclick = () => {
                        const parts = path.split('/');
                        parts.pop();
                        loadVault(parts.join('/') || "vault");
                    };
                    explorer.appendChild(back);
                }

                data.forEach(item => {
                    // Hide slice parts from the website view
                    if (item.name.includes(".part")) return;

                    const div = document.createElement('div');
                    div.className = "item";

                    if (item.type === "dir") {
                        div.innerHTML = `
                            <div class="folder" onclick="loadVault('${item.path}')">
                                📁 ${item.name}/
                            </div>
                            <span style="color: #555;">Folder</span>`;
                    } else {
                        const size = (item.size / (1024 * 1024)).toFixed(2);
                        div.innerHTML = `
                            <div class="file">📄 ${item.name}</div>
                            <div>
                                <span style="margin-right: 10px; color: #888;">${size} MB</span>
                                <button onclick="window.open('${item.download_url}')">Download</button>
                            </div>`;
                    }
                    explorer.appendChild(div);
                });
            } catch (err) {
                explorer.innerHTML = "Error: Folder not found or Token invalid.";
            }
        }

        loadVault();
    </script>
</body>
</html>
