<!DOCTYPE html>
<html>
<head>
    <title>1PB Hackintosh Vault</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #eee; padding: 20px; }
        .item { background: #161616; padding: 10px 20px; border-radius: 8px; display: flex; align-items: center; margin-bottom: 5px; border: 1px solid #222; }
        .name { flex-grow: 1; cursor: pointer; }
        .folder { color: #ffca28; font-weight: bold; }
        .file { color: #81d4fa; }
        button { background: #007bff; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-left: 5px; }
        .del { background: #dc3545; }
        .refresh { background: #28a745; padding: 10px; margin-bottom: 15px; }
        #path { color: #00ff00; margin-bottom: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>☁️ 1PB Vault</h1>
    <button class="refresh" onclick="loadVault()">🔄 Refresh Vault</button>
    <div id="path">vault</div>
    <div id="list">Loading...</div>

    <script>
        const REPO = "Codeblub/cloud-stoage";
        let TOKEN = localStorage.getItem('gh_token');
        if(!TOKEN) { TOKEN = prompt("Enter GitHub Token"); localStorage.setItem('gh_token', TOKEN); }

        async function del(name, isSliced, path) {
            if(!confirm("Delete " + name + "?")) return;
            const h = { 'Authorization': `token ${TOKEN}` };
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {headers: h});
            const items = await res.json();
            const targets = items.filter(i => i.name === name || (isSliced && i.name.startsWith(name + '.part')));
            for(let t of targets) {
                await fetch(`https://api.github.com/repos/${REPO}/contents/${t.path}`, {
                    method: 'DELETE', headers: h, body: JSON.stringify({message: "Delete", sha: t.sha})
                });
            }
            loadVault(path);
        }

        async function loadVault(path = "vault") {
            const list = document.getElementById('list');
            document.getElementById('path').innerText = path;
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {headers: {'Authorization': `token ${TOKEN}`}});
            const data = await res.json();
            list.innerHTML = "";
            
            let files = {};
            data.forEach(item => {
                if(item.type === "dir") {
                    let d = document.createElement('div'); d.className = "item";
                    d.innerHTML = `<span class="name folder" onclick="loadVault('${item.path}')">📁 ${item.name}/</span>`;
                    list.appendChild(d);
                } else {
                    let clean = item.name.split('.part')[0];
                    if(!files[clean]) files[clean] = { name: clean, size: 0, sliced: false, url: item.download_url, path: path };
                    files[clean].size += item.size;
                    if(item.name.includes('.part')) files[clean].sliced = true;
                }
            });

            Object.values(files).forEach(f => {
                let d = document.createElement('div'); d.className = "item";
                d.innerHTML = `<span class="name file">📄 ${f.name}</span> 
                    <span style="font-size:12px;color:#666">${(f.size/1048576).toFixed(2)}MB</span>
                    <button onclick="window.open('${f.url}')">Download</button>
                    <button class="del" onclick="del('${f.name}', ${f.sliced}, '${f.path}')">Delete</button>`;
                list.appendChild(d);
            });
        }
        loadVault();
    </script>
</body>
</html>
