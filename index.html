<!DOCTYPE html>
<html>
<head>
    <title>GitHub Cloud Explorer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: #1a1a1a; color: white; }
        .container { max-width: 800px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .file-card { background: #3d3d3d; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: #238636; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; margin-right: 5px; }
        .btn-delete { background: #da3633; }
        #status { margin-top: 10px; color: #8b949e; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>☁️ 200GB Hackintosh Vault</h1>
        <input type="file" id="fileInput" multiple>
        <button class="btn" onclick="uploadFiles()">Upload All Selected</button>
        <div id="status"></div>
        <hr style="border: 0.5px solid #444; margin: 20px 0;">
        <div id="fileList">Loading files...</div>
    </div>

    <script>
        const TOKEN = prompt("Enter your GitHub Token:");
        const REPO = "Codeblub/cloud-stoage";
        const statusDiv = document.getElementById('status');

        async function loadFiles() {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/vault`, {
                headers: { 'Authorization': `token ${TOKEN}` }
            });
            const files = await res.json();
            const container = document.getElementById('fileList');
            container.innerHTML = '';
            files.forEach(file => {
                if(file.name !== ".gitkeep") {
                    container.innerHTML += `
                        <div class="file-card">
                            <span>📄 ${file.name}</span>
                            <div>
                                <a class="btn" href="${file.download_url}" target="_blank">Download</a>
                                <button class="btn btn-delete" onclick="deleteFile('${file.name}', '${file.sha}')">Delete</button>
                            </div>
                        </div>`;
                }
            });
        }

        async function uploadFiles() {
            const files = document.getElementById('fileInput').files;
            if (files.length === 0) return alert("Select files first!");
            
            for (let file of files) {
                statusDiv.innerText = `Uploading ${file.name}...`;
                const reader = new FileReader();
                const promise = new Promise(resolve => {
                    reader.onload = async () => {
                        const content = reader.result.split(',')[1];
                        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/vault/${file.name}`, {
                            method: 'PUT',
                            headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: `Upload ${file.name}`, content: content })
                        });
                        resolve(res.ok);
                    };
                });
                reader.readAsDataURL(file);
                await promise;
            }
            statusDiv.innerText = "All uploads complete!";
            loadFiles();
        }

        async function deleteFile(name, sha) {
            if(!confirm(`Delete ${name}?`)) return;
            await fetch(`https://api.github.com/repos/${REPO}/contents/vault/${name}`, {
                method: 'DELETE',
                headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Delete ${name}`, sha: sha })
            });
            loadFiles();
        }

        loadFiles();
    </script>
</body>
</html>
