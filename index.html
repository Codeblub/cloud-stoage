<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1PB Vault Control</title>
    <style>
        :root { --neon-green: #00ff41; --bg-black: #0d0d0d; }
        body { background: var(--bg-black); color: var(--neon-green); font-family: monospace; padding: 20px; }
        .progress-container { width: 100%; background: #222; height: 20px; margin: 10px 0; border: 1px solid var(--neon-green); display: none; }
        .progress-bar { width: 0%; height: 100%; background: var(--neon-green); transition: width 0.3s; }
        .file-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 10px; }
        button { background: black; color: var(--neon-green); border: 1px solid var(--neon-green); cursor: pointer; padding: 5px 10px; margin-left: 5px; }
        button:hover { background: var(--neon-green); color: black; }
        input[type="text"] { background: #1a1a1a; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 5px; width: 300px; }
    </style>
</head>
<body>

    <h2>🔒 1PB VAULT ENGINE</h2>
    <div id="auth-section">
        <input type="text" id="token-input" placeholder="Enter Token (ghp_ or github_pat_)...">
        <button onclick="saveToken()">INITIALIZE ENGINE</button>
    </div>

    <hr>

    <h3>UPLOADER</h3>
    <input type="file" id="file-picker">
    <button onclick="uploadFile()">UPLOAD TO VAULT</button>
    
    <div class="progress-container" id="p-container">
        <div class="progress-bar" id="p-bar"></div>
    </div>
    <div id="upload-status"></div>

    <hr>

    <h3>VAULT CONTENTS</h3>
    <button onclick="loadVault()">REFRESH FILES</button>
    <div id="file-list"></div>

    <script>
        const REPO = "Codeblub/cloud-stoage";
        const VAULT_PATH = "vault"; // We are specifically syncing the vault folder

        function saveToken() {
            const token = document.getElementById('token-input').value;
            localStorage.setItem('github_token', token);
            alert("Token Saved. Engine Primed.");
        }

        async function uploadFile() {
            const token = localStorage.getItem('github_token');
            const file = document.getElementById('file-picker').files[0];
            if (!file || !token) return alert("Missing File or Token");

            const pContainer = document.getElementById('p-container');
            const pBar = document.getElementById('p-bar');
            const status = document.getElementById('upload-status');

            pContainer.style.display = 'block';
            pBar.style.width = '0%';
            status.innerText = "Encoding file...";

            // Read file as Base64 (Required by GitHub API)
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const content = reader.result.split(',')[1];
                status.innerText = "Pushing to GitHub...";
                
                // Simulating progress bar for API call (GitHub doesn't give true upload stream for small files)
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 10;
                    pBar.style.width = progress + '%';
                    if (progress >= 90) clearInterval(interval);
                }, 100);

                try {
                    const response = await fetch(`https://api.github.com/repos/${REPO}/contents/${VAULT_PATH}/${file.name}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json',
                            'X-GitHub-Api-Version': '2022-11-28' // Fixed API Version
                        },
                        body: JSON.stringify({
                            message: `Upload: ${file.name}`,
                            content: content
                        })
                    });

                    if (response.ok) {
                        pBar.style.width = '100%';
                        status.innerText = "UPLOAD SUCCESSFUL";
                        loadVault();
                    } else {
                        const err = await response.json();
                        status.innerText = "ERROR: " + err.message;
                    }
                } catch (e) {
                    status.innerText = "NETWORK ERROR";
                }
            };
        }

        async function loadVault() {
            const token = localStorage.getItem('github_token');
            const list = document.getElementById('file-list');
            list.innerHTML = "Accessing Vault...";

            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${VAULT_PATH}`, {
                headers: { 'Authorization': `token ${token}`, 'X-GitHub-Api-Version': '2022-11-28' }
            });
            const files = await res.json();

            list.innerHTML = "";
            files.forEach(file => {
                if (file.type === 'dir') return;
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `
                    <span>${file.name}</span>
                    <div>
                        <button onclick="window.open('${file.download_url}')">DOWNLOAD</button>
                        <button onclick="deleteFile('${file.path}', '${file.sha}')" style="border-color: red; color: red;">DELETE</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function deleteFile(path, sha) {
            const token = localStorage.getItem('github_token');
            if (!confirm("Confirm Destruction?")) return;

            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                method: 'DELETE',
                headers: { 'Authorization': `token ${token}`, 'X-GitHub-Api-Version': '2022-11-28' },
                body: JSON.stringify({ message: "File Deleted", sha: sha })
            });

            if (res.ok) loadVault();
        }

        // Auto-load on start
        if (localStorage.getItem('github_token')) loadVault();
    </script>
</body>
</html>
