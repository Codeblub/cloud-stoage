<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>1PB Hackintosh Vault</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 40px; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        #login-screen { display: none; text-align: center; margin-top: 100px; }
        #app-screen { display: none; }
        input { padding: 10px; width: 300px; border-radius: 5px; border: 1px solid #333; background: #1a1a1a; color: white; }
        #path-bar { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-family: monospace; color: #00ff00; border: 1px solid #333; }
        #explorer { display: flex; flex-direction: column; gap: 10px; }
        .item { background: #1e1e1e; padding: 15px 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; transition: 0.2s; }
        .item:hover { background: #252525; transform: translateX(5px); }
        .folder { color: #ffca28; font-weight: bold; cursor: pointer; flex-grow: 1; }
        .file { color: #81d4fa; }
        button { cursor: pointer; background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 6px; }
        .logout { background: #ff5252; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-screen">
            <h1>🔐 Vault Access</h1>
            <p>Enter your GitHub Token to access your 1PB Storage</p>
            <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx">
            <button onclick="saveToken()">Login</button>
        </div>

        <div id="app-screen">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h1>☁️ 1PB Hackintosh Vault</h1>
                <button class="logout" onclick="logout()">Logout</button>
            </div>
            <div id="path-bar">root / vault</div>
            <div id="explorer">Connecting...</div>
        </div>
    </div>

    <script>
        const REPO = "Codeblub/cloud-stoage";
        let TOKEN = localStorage.getItem('gh_token');

        function checkAuth() {
            if (!TOKEN) {
                document.getElementById('login-screen').style.display = 'block';
                document.getElementById('app-screen').style.display = 'none';
            } else {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                loadVault();
            }
        }

        function saveToken() {
            const input = document.getElementById('token-input').value;
            if (input) {
                localStorage.setItem('gh_token', input);
                TOKEN = input;
                checkAuth();
            }
        }

        function logout() {
            localStorage.removeItem('gh_token');
            location.reload();
        }

        async function loadVault(path = "vault") {
            const explorer = document.getElementById('explorer');
            const pathBar = document.getElementById('path-bar');
            pathBar.innerText = path.replace(/\//g, " ❯ ");
            explorer.innerHTML = "Scanning...";

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                    headers: { 'Authorization': `token ${TOKEN}` }
                });
                
                if (res.status === 401) { logout(); return; }
                const items = await res.json();
                explorer.innerHTML = "";

                if (path !== "vault") {
                    const back = document.createElement('div');
                    back.style.cursor = "pointer";
                    back.innerHTML = "⬅ Go Back";
                    back.onclick = () => {
                        const parts = path.split('/');
                        parts.pop();
                        loadVault(parts.join('/') || "vault");
                    };
                    explorer.appendChild(back);
                }

                items.forEach(item => {
                    if (item.name.includes(".part")) return;
                    const div = document.createElement('div');
                    div.className = "item";
                    if (item.type === "dir") {
                        div.innerHTML = `<div class="folder" onclick="loadVault('${item.path}')">📁 ${item.name}/</div>`;
                    } else {
                        const size = (item.size / (1024 * 1024)).toFixed(2);
                        div.innerHTML = `<div class="file">📄 ${item.name}</div><div><span style='color:#888; font-size:12px; margin-right:10px;'>${size} MB</span><button onclick="window.open('${item.download_url}')">Download</button></div>`;
                    }
                    explorer.appendChild(div);
                });
            } catch (e) { explorer.innerHTML = "Error loading files."; }
        }

        checkAuth();
    </script>
</body>
</html>
