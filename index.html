<!DOCTYPE html>
<html>
<head>
    <title>GitHub 1PB Cloud Explorer</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .item { background: #2a2a2a; margin: 5px 0; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .folder { color: #ffca28; font-weight: bold; cursor: pointer; }
        .file { color: #81d4fa; }
        button { cursor: pointer; margin-left: 10px; background: #444; color: white; border: none; padding: 5px 10px; border-radius: 3px; }
        button:hover { background: #666; }
        #path-display { margin-bottom: 20px; color: #aaa; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>☁️ 1PB Hackintosh Vault</h1>
    <div id="path-display">Root / vault</div>
    <div id="explorer">Loading vault...</div>

    <script>
        const REPO = "Codeblub/cloud-stoage";
        const TOKEN = "YOUR_GITHUB_TOKEN_HERE"; // It's safer to use a token with only 'public_repo' access
        let currentPath = "vault";

        async function loadVault(path = "vault") {
            currentPath = path;
            document.getElementById('path-display').innerText = `Location: ${path}`;
            const explorer = document.getElementById('explorer');
            explorer.innerHTML = "Scanning...";

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO/contents/${path}`, {
                    headers: { 'Authorization': `token ${TOKEN}` }
                });
                const items = await res.json();
                
                explorer.innerHTML = "";
                
                // Add a "Back" button if not in root
                if (path !== "vault") {
                    const backDiv = document.createElement('div');
                    backDiv.className = "item folder";
                    backDiv.innerHTML = "📁 .. (Go Back)";
                    backDiv.onclick = () => {
                        const parts = path.split('/');
                        parts.pop();
                        loadVault(parts.join('/'));
                    };
                    explorer.appendChild(backDiv);
                }

                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "item";
                    
                    if (item.type === "dir") {
                        div.innerHTML = `<span class="folder">📁 ${item.name}/</span> <span>Folder</span>`;
                        div.onclick = () => loadVault(item.path);
                    } else {
                        const size = (item.size / (1024 * 1024)).toFixed(2);
                        div.innerHTML = `
                            <span class="file">📄 ${item.name}</span>
                            <span>(${size} MB) 
                                <button onclick="window.open('${item.download_url}')">Download</button>
                            </span>`;
                    }
                    explorer.appendChild(div);
                });
            } catch (e) {
                explorer.innerHTML = "Error loading files. Check your Token or Repo.";
            }
        }

        loadVault();
    </script>
</body>
</html>
